# =============================================================================
# .github/workflows/build.yml
# =============================================================================
# This workflow builds your custom OCI image daily and pushes it to GitHub
# Container Registry (ghcr.io). Your system pulls updates automatically.
# =============================================================================

name: Build Custom Image

on:
  # Build daily to pick up upstream Bazzite updates
  schedule:
    - cron: '0 5 * * *'
  # Also build on push to main (so you see results immediately when you edit)
  push:
    branches: [main]
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

env:
  IMAGE_NAME: custom-bazzite
  IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: |
          podman build \
            --tag ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            --tag ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:$(date +%Y%m%d) \
            .

      - name: Push image
        run: |
          podman push ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          podman push ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:$(date +%Y%m%d)

# =============================================================================
# The date-tagged images (e.g., :20260405) let you pin to a known-good build:
#   sudo bootc switch ghcr.io/YOUR_USERNAME/my-workstation:20260405
# =============================================================================