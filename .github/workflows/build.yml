name: Build Custom Image

on:
  schedule:
    - cron: '0 5 * * *'
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: bazzite-dx-custom-nvidia
  IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Resolve VeraCrypt RPM URL
        id: veracrypt
        run: |
          TAG=$(curl -s https://api.github.com/repos/veracrypt/VeraCrypt/releases/latest \
                | jq -r '.tag_name')
          VER="${TAG#VeraCrypt_}"
          echo "url=https://github.com/veracrypt/VeraCrypt/releases/download/${TAG}/veracrypt-${VER}-1.x86_64.rpm" \
            >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        env:
          OWNER: ${{ github.repository_owner }}
        run: |
          IMAGE="ghcr.io/${OWNER,,}/${{ env.IMAGE_NAME }}"
          DATE=$(date +%Y%m%d)
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "date=${DATE}" >> "$GITHUB_OUTPUT"
          podman build \
            --build-arg BASE_IMAGE=ghcr.io/ublue-os/bazzite-nvidia:stable \
            --build-arg IMAGE_NAME=${{ env.IMAGE_NAME }} \
            --build-arg IMAGE_VENDOR=${OWNER,,} \
            --build-arg VERACRYPT_RPM_URL=${{ steps.veracrypt.outputs.url }} \
            --tag "${IMAGE}:latest" \
            --tag "${IMAGE}:${DATE}" \
            .
          podman push "${IMAGE}:latest"
          podman push "${IMAGE}:${DATE}"

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign container image
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.SIGNING_SECRET }}
        run: |
          cosign sign -y --key env://COSIGN_PRIVATE_KEY \
            "${{ steps.build.outputs.image }}:latest"
          cosign sign -y --key env://COSIGN_PRIVATE_KEY \
            "${{ steps.build.outputs.image }}:${{ steps.build.outputs.date }}"
