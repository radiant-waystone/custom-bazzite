fs.inotify.max_user_watches = 524288

# Restrict kernel pointer leaks in /proc (requires root to read)
kernel.kptr_restrict = 2
# Restrict dmesg to root
kernel.dmesg_restrict = 1
# Harden BPF JIT compiler against Spectre-style attacks
net.core.bpf_jit_harden = 2
# Block unprivileged BPF syscalls (only root/CAP_BPF may load BPF programs)
kernel.unprivileged_bpf_disabled = 1
# Strict reverse-path filtering: drop packets with spoofed source addresses
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1
# SYN flood protection
net.ipv4.tcp_syncookies = 1
